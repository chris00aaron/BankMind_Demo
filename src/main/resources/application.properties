spring.application.name=BankMind

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/Banco_final_prueba_integracion
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=BankMindSecretKeyForJWTTokensMinimum256BitsRequiredForHS256Algorithm2024
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

# OTP Configuration
otp.expiration-minutes=5
otp.max-attempts=3

# CORS Configuration
cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://localhost:3000

# Server Configuration
server.port=8080

# Fraud API Configuration (Python FastAPI)
api.base-url=http://localhost:8000
api.timeout=30000

# Email Configuration (Gmail)
