# ============================================================
# BankMind Backend — Docker Compose (PostgreSQL local)
# Para desarrollo local con base de datos dockerizada
# ============================================================

services:
  postgres:
    image: 'postgres:16-alpine'
    container_name: bankmind-db-local
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-BankMind_ATM}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-uns20}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
