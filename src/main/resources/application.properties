spring.application.name=BankMind

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/BankMindDB
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Batch Insert Optimization
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# JWT Configuration
jwt.secret=BankMindSecretKeyForJWTTokensMinimum256BitsRequiredForHS256Algorithm2024
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

# OTP Configuration
otp.expiration-minutes=5
otp.max-attempts=3

# ── Twilio SMS Configuration ──────────────────────────────────────────────────
# Activa el envío real de SMS. Pon false para usar el log en consola (dev).
twilio.enabled=true
# Credenciales de tu cuenta Twilio (https://console.twilio.com)
twilio.account-sid=ACa147caca187164386946f1ae3a6ceb90
twilio.auth-token=a81363f9f5916b2b5bab4b1594d1dfcb
# Número de Twilio desde el que se enviarán los SMS (ej: +14155552671)
twilio.from-number=+18049069166
# Prefijo de país para normalizar los teléfonos del usuario (Peru = +51)
twilio.country-prefix=+51

# CORS Configuration
cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://localhost:3000

# Server Configuration
server.port=8080

# Fraud API Configuration (Python FastAPI)
api.base-url=http://localhost:8000
api.timeout=30000

# Churn API Configuration (Python FastAPI)
churn.api.base-url=http://localhost:8000
churn.api.timeout=30000

# Email Configuration (Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=notificacionesbankmind@gmail.com
spring.mail.password=oqot nvpo bhbr eaop
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# BankMind Email Settings
bankmind.email.from=notificacionesbankmind@gmail.com
bankmind.email.from-name=BankMind - Sistema de Seguridad
bankmind.email.confirmation-url=http://localhost:8080/api/fraud
bankmind.email.token-expiry-hours=24

# Self-Training API Configuration
self-training.api.base-url=http://localhost:8001
spring.cloud.openfeign.client.config.self-training-api.connect-timeout=10000
spring.cloud.openfeign.client.config.self-training-api.read-timeout=900000

# Prediction API (Morosidad) - Hot Reload
prediction.api.morosidad-url=http://localhost:8000

# ── Fraud Scheduler API endpoints ────────────────────────────────────────────
fraud.scheduler.training-url=${self-training.api.base-url}/fraude/train
fraud.scheduler.drift-url=${self-training.api.base-url}/fraude/drift/calculate
fraud.scheduler.clustering-url=${self-training.api.base-url}/fraude/clustering/compute
fraud.scheduler.reload-url=${api.base-url}/api/v1/fraud/reload
# Timeout (ms) para las llamadas HTTP síncronas del Scheduler (entrenamiento puede tardar ~15 min)
fraud.scheduler.timeout-ms=900000

