spring.application.name=BankMindDefaultBetta_v1

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/BankMindDefault}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Batch Insert Optimization
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# JWT Configuration
jwt.secret=${JWT_SECRET:BankMindSecretKeyForJWTTokensMinimum256BitsRequiredForHS256Algorithm2024}
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

# OTP Configuration
otp.expiration-minutes=5
otp.max-attempts=3

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000}

# Server Configuration
server.port=8080

# Fraud API Configuration (Python FastAPI)
api.base-url=${API_BASE_URL:http://localhost:8000}
api.timeout=30000

# Email Configuration (Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:notificacionesbankmind@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:oqot nvpo bhbr eaop}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# BankMind Email Settings
bankmind.email.from=${BANKMIND_EMAIL_FROM:notificacionesbankmind@gmail.com}
bankmind.email.from-name=BankMind - Sistema de Seguridad
bankmind.email.token-expiry-hours=24

# Self-Training API Configuration
self-training.api.base-url=${SELF_TRAINING_API_BASE_URL:http://localhost:8001}
spring.cloud.openfeign.client.config.self-training-api.connect-timeout=10000
spring.cloud.openfeign.client.config.self-training-api.read-timeout=900000

# Prediction API (Morosidad) - Hot Reload
prediction.api.morosidad-url=${PREDICTION_API_MOROSIDAD_URL:http://localhost:8000}


# ── Encryption (AES-256-GCM) ─────────────────────────────────────────────────
# Clave de 32 caracteres (256 bits). Cambiar en producción y usar variables de entorno.
bankmind.encryption.secret-key=${BANKMIND_ENCRYPTION_SECRET_KEY:BankMindAES256SecretKey32ByteLen}
